id: T8_code_exception
name: demo-service 代码异常
description: |
  demo-service 被切换到错误参数模式，应用日志会出现稳定的代码级异常信号。
  Agent 需要优先从 logs 中识别 stack trace、错误参数等代码缺陷线索，而不是误判为资源不足。

environment:
  type: k8s
  namespace: aiops-t8
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t8
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t8
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: bad_parameter_code_fault
    type: k8s.set_env
    target:
      namespace: aiops-t8
      deployment: demo-service
    spec:
      env:
        BUG_MODE: bad_parameter
      timeout_seconds: 120

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。

solution_contract:
  allowed_actions:
    - kubectl_set_env
    - kubectl_restart

evaluation:
  type: deepseek
