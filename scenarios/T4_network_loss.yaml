id: T4_network_loss
name: demo-service 网络丢包
description: |
  demo-service 所在 Pod 被注入网络丢包，服务访问可能出现间歇性失败或超时。
  Agent 需要结合 NetworkChaos 资源、Pod 状态和资源指标，区分网络质量问题与应用崩溃。

environment:
  type: k8s
  namespace: aiops-t4
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t4
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t4
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: network_loss
    type: chaos_mesh.network_loss
    target:
      namespace: aiops-t4
      selector:
        app: demo-service
    spec:
      mode: one
      loss: "35"
      correlation: "25"
      duration: 5m

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。

solution_contract:
  allowed_actions:
    - kubectl_restart

evaluation:
  type: deepseek
