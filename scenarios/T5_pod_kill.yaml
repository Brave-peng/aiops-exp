id: T5_pod_kill
name: demo-service Pod 被杀死
description: |
  demo-service 的一个 Pod 被 Chaos Mesh 杀死，Deployment 应该创建新 Pod 恢复副本数。
  Agent 需要从 Pod 重建、事件和 PodChaos 资源判断这是生命周期故障，而不是应用代码异常。

environment:
  type: k8s
  namespace: aiops-t5
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t5
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t5
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: pod_kill
    type: chaos_mesh.pod_kill
    target:
      namespace: aiops-t5
      selector:
        app: demo-service
    spec:
      mode: one

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。

solution_contract:
  allowed_actions:
    - kubectl_restart
    - kubectl_scale

evaluation:
  type: deepseek
