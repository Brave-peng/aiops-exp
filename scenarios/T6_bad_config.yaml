id: T6_bad_config
name: demo-service 下游配置错误
description: |
  demo-service 被注入错误的 DOWNSTREAM_URL，应用日志会持续出现 bad_downstream_url 配置异常信号。
  Agent 需要从 Deployment 环境变量和日志判断根因是错误配置，而不是 CPU、内存或网络故障。

environment:
  type: k8s
  namespace: aiops-t6
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t6
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t6
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: bad_downstream_config
    type: k8s.set_env
    target:
      namespace: aiops-t6
      deployment: demo-service
    spec:
      env:
        DOWNSTREAM_URL: http://missing-dependency.aiops-t6.svc.cluster.local:8080
      timeout_seconds: 120

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。
    本 demo-service 不依赖真实下游服务；如果 DOWNSTREAM_URL 指向 missing-dependency，请建议把 DOWNSTREAM_URL 回滚为空字符串，不要使用占位符地址。

solution_contract:
  allowed_actions:
    - kubectl_set_env
    - kubectl_restart

evaluation:
  type: deepseek
