id: T2_memory_pressure
name: demo-service 内存压力
description: |
  demo-service 出现内存压力，可能导致响应变慢、Pod 内存使用率升高或接近限制。
  Agent 需要结合资源指标和 Kubernetes 事件判断是否是内存类资源瓶颈。

environment:
  type: k8s
  namespace: aiops-t2
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t2
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t2
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: memory_pressure
    type: chaos_mesh.stress_memory
    target:
      namespace: aiops-t2
      selector:
        app: demo-service
    spec:
      workers: 1
      size: 96MB
      duration: 5m

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。

solution_contract:
  allowed_actions:
    - kubectl_scale
    - kubectl_set_resources
    - kubectl_restart

evaluation:
  type: deepseek
