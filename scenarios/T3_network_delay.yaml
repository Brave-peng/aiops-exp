id: T3_network_delay
name: demo-service 网络延迟
description: |
  demo-service 所在 Pod 被注入网络延迟，服务访问可能变慢但容器本身仍保持运行。
  Agent 需要区分网络链路异常和 CPU、内存等本地资源瓶颈。

environment:
  type: k8s
  namespace: aiops-t3
  setup:
    - type: kubectl_apply
      path: deploy/demo-app/k8s.yaml
  readiness:
    - type: kubectl_rollout
      resource: deployment/demo-service
      namespace: aiops-t3
      timeout_seconds: 120
  cleanup:
    mode: delete_namespace

workload:
  namespace: aiops-t3
  kind: Deployment
  name: demo-service
  selector:
    app: demo-service
  containers:
    - demo-service

faults:
  - id: network_delay
    type: chaos_mesh.network_delay
    target:
      namespace: aiops-t3
      selector:
        app: demo-service
    spec:
      mode: one
      latency: 500ms
      jitter: 50ms
      correlation: "25"
      duration: 5m

agent_task:
  instruction: |
    你可以使用只读 kubectl 命令查看现场，例如 get、describe、logs、top。
    禁止执行任何会修改集群状态的命令，例如 apply、delete、scale、patch、exec。
    请诊断问题并给出修复建议，不要直接执行修复。

solution_contract:
  allowed_actions:
    - kubectl_scale
    - kubectl_set_resources
    - kubectl_restart

evaluation:
  type: deepseek
